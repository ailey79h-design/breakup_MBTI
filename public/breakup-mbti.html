        .scale-dot.active-plus { background-color: #fb7185; border-color: #fb7185; transform: scale(1.15); box-shadow: 0 0 15px rgba(251, 113, 133, 0.3); }

        .scale-dot.active-neutral { background-color: #e2e8f0; border-color: #cbd5e1; }
        .progress-bar { height: 6px; background: #ffe4e6; border-radius: 10px; overflow: hidden; }
        .progress-fill { background: linear-gradient(90deg, #fda4af, #fb7185); transition: width 0.4s ease; }
        #toast { visibility: hidden; min-width: 200px; background-color: rgba(0,0,0,0.8); color: #fff; text-align: center; border-radius: 30px; padding: 12px 24px; position: fixed; z-index: 1000; left: 50%; transform: translateX(-50%); bottom: 40px; font-size: 14px; opacity: 0; transition: 0.3s; }
        #toast.show { visibility: visible; opacity: 1; }
        .modal { display: none; position: fixed; inset: 0; z-index: 2000; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; padding: 20px; }
        .modal.active { display: flex; animation: fadeIn 0.3s ease; }

                best: "ERLC",
                worst: "ISHA",
                bestDetail: "서로의 사생활을 존중하며 조용히 끝냅니다. 헤어진 줄도 모르게 조용히, 하지만 확실하게 남이 되는 관계.",
                worstDetail: "나는 조용히 있고 싶은데 상대는 계속 감정적인 연락을 해옵니다. 나의 평온한 일상이 파괴되는 고통스러운 관계."
            },
            "ESHC": {
                title: "감정 과부하 에너자이저",
                desc: "사랑도 이별도 에너지가 넘쳐요. 붙잡을 때도 온 힘을 다해 붙잡지만, 차단당하면 또 그만큼 크게 좌절하는 드라마틱한 유형.",
                best: "ISLC",
                worst: "ISLC",
                bestDetail: "폭발하는 내 감정을 상대의 차분함이 진정시켜줍니다. 비록 차갑게 느껴져도 결과적으로는 가장 깔끔한 마무리가 가능해요.",
                worstDetail: "가장 뜨겁게 매달리는 나와 가장 차갑게 밀어내는 상대. 자존심이 가루가 될 때까지 싸우게 되는 조합입니다."
            },
            "IRHA": {
                title: "속앓이 장인",
                desc: "말 안 하고 쌓아두다 한계가 오면 펑 터지는 스타일. 상대는 갑작스러운 이별 통보에 당황할 수밖에 없어요.",
                best: "ISHC",
                worst: "ESHA",
                bestDetail: "둘 다 속으로만 삭히다 보니 큰 소리 한 번 안 나고 갑자기 끝이 납니다. 허무할 순 있어도 가장 조용한 이별.",
                worstDetail: "나는 조용히 끝내고 싶은데 상대는 왜 말 안 했냐며 드라마를 찍습니다. 감정 소모가 극에 달하는 조합입니다."
            },
            "ISHC": {
                title: "철벽 감정 차단기",
                desc: "한 번 선 넘으면 끝. 상대가 아무리 울며 붙잡아도 감정적으로 전혀 흔들리지 않고 차갑게 선을 긋습니다.",
                best: "IRHA",
                worst: "ESHC",
                bestDetail: "말 많은 것보다 말 없는 것이 낫습니다. 서로 깔끔하게 선을 긋고 더 이상 엮이지 않는 완벽한 타인 모드.",
                worstDetail: "상대는 울며 불며 매달리는데 나는 이미 마음의 빗장을 걸었습니다. 한 명은 괴물, 한 명은 비련의 주인공이 됩니다."
            }
        };

        const init = async () => {
            if (!auth) return;
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
                onAuthStateChanged(auth, (user) => {
                    currentUser = user;
                    const urlParams = new URLSearchParams(window.location.search);
                    if (urlParams.get('id') && user) loadSharedResult(urlParams.get('id'));
                });
            } catch (e) { console.error(e); }
        };

        const loadSharedResult = async (id) => {
            if (!db || !currentUser) return;
            document.getElementById('home-screen').classList.add('hidden');
            document.getElementById('loading-screen').classList.remove('hidden');
            try {
                const docSnap = await getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'results', id));
                if (docSnap.exists()) {
                    displayResult(docSnap.data().mbti, docSnap.data().scores, { fromShare: true });
                    shareableDocId = id;
                }
            } catch (e) {
                console.error("Shared result load error:", e);
                location.href = SHARE_PAGE_PATH;
            }
        };

        let answers = {};
        let shareableDocId = null;
        let lastMbti = null;
        let lastScores = null;

        const SCORE_KEYS = ['E', 'I', 'R', 'S', 'H', 'L', 'C', 'A'];

        function encodeSharePayload(mbti, scores) {
            const s = {};
            for (const k of SCORE_KEYS) s[k] = Number(scores[k]) || 0;
            const json = JSON.stringify({ m: mbti, s });
            const bytes = new TextEncoder().encode(json);
            let bin = '';
            for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
            return btoa(bin).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
        }

        function decodeSharePayload(encoded) {
            try {
                if (!encoded || typeof encoded !== 'string') return null;
                let b64 = encoded.replace(/-/g, '+').replace(/_/g, '/');
                const pad = b64.length % 4;
                if (pad) b64 += '='.repeat(4 - pad);
                const binary = atob(b64);
                const bytes = new Uint8Array(binary.length);
                for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
                const o = JSON.parse(new TextDecoder().decode(bytes));
                if (!o || typeof o.m !== 'string' || o.m.length !== 4 || !o.s || typeof o.s !== 'object') return null;
                const out = {};
                for (const k of SCORE_KEYS) {
                    const n = Number(o.s[k]);
                    if (Number.isNaN(n)) return null;
                    out[k] = n;
                }
                return { m: o.m.toUpperCase(), s: out };
            } catch (e) {
                return null;
            }
        }

        function tryOpenSharedFromUrl() {
            const r = new URLSearchParams(window.location.search).get('r');
            if (!r || !r.trim()) return false;
            const data = decodeSharePayload(r.trim());
            if (!data) return false;
            document.getElementById('home-screen').classList.add('hidden');
            document.getElementById('test-screen').classList.add('hidden');
            document.getElementById('loading-screen').classList.add('hidden');
            document.getElementById('progress-wrapper').classList.add('hidden');
            displayResult(data.m, data.s, { fromShare: true });
            shareableDocId = null;
            return true;
        }

        const renderQuestions = () => {
            const container = document.getElementById('question-container');
            container.innerHTML = questions.map(q => `
                <div class="fade-in px-4 text-center">
                    <h3 class="text-xl font-bold text-slate-800 mb-8 leading-snug break-keep">${q.q}</h3>
                    <div class="flex items-center justify-between max-w-sm mx-auto">
                        <span class="text-rose-400 font-bold text-[11px]">완전 인정</span>
                        <div class="flex items-center gap-2">
                            <div onclick="window.selectScore(${q.id}, 3, 'plus')" class="scale-dot w-9 h-9 rounded-full" id="dot-${q.id}-p3"></div>
                            <div onclick="window.selectScore(${q.id}, 2, 'plus')" class="scale-dot w-7 h-7 rounded-full" id="dot-${q.id}-p2"></div>
                            <div onclick="window.selectScore(${q.id}, 0, 'neutral')" class="scale-dot w-5 h-5 rounded-full" id="dot-${q.id}-n"></div>
                            <div onclick="window.selectScore(${q.id}, 2, 'minus')" class="scale-dot w-7 h-7 rounded-full" id="dot-${q.id}-m2"></div>
                            <div onclick="window.selectScore(${q.id}, 3, 'minus')" class="scale-dot w-9 h-9 rounded-full" id="dot-${q.id}-m3"></div>
                        </div>
                        <span class="text-slate-300 font-bold text-[11px]">전혀 아님</span>
                    </div>
                </div>
            `).join('');
        };

        window.selectScore = (qId, score, type) => {
            const suffixes = ['p3', 'p2', 'n', 'm2', 'm3'];
            suffixes.forEach(s => document.getElementById(`dot-${qId}-${s}`)?.classList.remove('active-plus', 'active-minus', 'active-neutral'));
            const targetId = type === 'plus' ? `dot-${qId}-p${score}` : (type === 'minus' ? `dot-${qId}-m${score}` : `dot-${qId}-n`);
            document.getElementById(targetId)?.classList.add(type === 'plus' ? 'active-plus' : (type === 'minus' ? 'active-minus' : 'active-neutral'));
            answers[qId] = type === 'plus' ? score : (type === 'minus' ? -score : 0);
            updateProgress();
        };

        const updateProgress = () => {
            const count = Object.keys(answers).length;
            const progress = Math.round((count / questions.length) * 100);
            const progressBar = document.getElementById('header-progress');
            const progressText = document.getElementById('progress-text');
            if (progressBar) progressBar.style.width = progress + '%';
            if (progressText) progressText.innerText = progress + '%';

            if (count === questions.length) {
                const btn = document.getElementById('submit-btn');
                if (btn) {
                    btn.classList.replace('bg-rose-100', 'btn-pink');
                    btn.classList.replace('text-rose-300', 'text-white');
                    btn.classList.remove('cursor-not-allowed');
                    btn.innerText = "결과 보러가기 ✨";
                }
            }
        };

        const calculateAndSave = async () => {
            if (Object.keys(answers).length < questions.length) return;
            document.getElementById('test-screen').classList.add('hidden');
            document.getElementById('loading-screen').classList.remove('hidden');

            let s = { E: 0, I: 0, R: 0, S: 0, H: 0, L: 0, C: 0, A: 0 };
            questions.forEach(q => {
                const v = answers[q.id] || 0;
                const [l, r] = q.type.split('');
                if (v > 0) s[l] += v; else if (v < 0) s[r] += Math.abs(v); else { s[l] += 0.5; s[r] += 0.5; }
            });
            const mbti = (s.E >= s.I ? "E" : "I") + (s.R >= s.S ? "R" : "S") + (s.H >= s.L ? "H" : "L") + (s.C >= s.A ? "C" : "A");

            try {
                if (db && currentUser) {
                    const id = crypto.randomUUID();
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'results', id), {
                        mbti, scores: s, createdAt: new Date().toISOString(), userId: currentUser.uid
                    });
                    shareableDocId = id;
                }
            } catch (e) { console.error("Save error:", e); }
            setTimeout(() => displayResult(mbti, s), 1500);
        };

        const displayResult = (mbti, s, options = {}) => {
            const fromShare = !!options.fromShare;
            lastMbti = mbti;
            lastScores = { ...s };
            document.getElementById('loading-screen').classList.add('hidden');
            document.getElementById('progress-wrapper').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');

            const data = typeData[mbti] || typeData["ERHC"];
            document.getElementById('result-mbti').innerText = mbti;
            document.getElementById('result-title').innerText = data.title;
            document.getElementById('result-desc').innerText = data.desc;
            document.getElementById('best-match').innerText = data.best;
            document.getElementById('worst-match').innerText = data.worst;

            const traits = [
                { l: 'E', r: 'I', label: '표현 방식', sl: '감정 발산', sr: '내면 침잠' },
                { l: 'R', r: 'S', label: '극복 방식', sl: '새로운 만남', sr: '혼자만의 시간' },
                { l: 'H', r: 'L', label: '미련 온도', sl: '뜨거운 집착', sr: '차가운 해탈' },
                { l: 'C', r: 'A', label: '종결 스타일', sl: '확실한 대화', sr: '조용한 회피' }
            ];

            document.getElementById('trait-dashboard').innerHTML = traits.map(t => {
                const total = (s[t.l] + s[t.r]) || 1;
                const lP = Math.round((s[t.l] / total) * 100);
                return `
                    <div class="space-y-1.5">
                        <div class="flex justify-between items-center px-1">
                            <span class="text-[9px] font-bold text-rose-300 uppercase">${t.sl}</span>
                            <span class="text-[10px] font-bold text-slate-400">${t.label}</span>
                            <span class="text-[9px] font-bold text-slate-300 uppercase">${t.sr}</span>
                        </div>
                        <div class="h-6 bg-white rounded-full flex overflow-hidden border border-rose-50 shadow-inner relative">
                            <div class="h-full bg-rose-200 transition-all duration-1000" style="width: ${lP}%"></div>
                            <div class="absolute inset-0 flex justify-between items-center px-3 pointer-events-none text-[10px] font-black">
                                <span class="text-rose-500">${lP}%</span>
                                <span class="text-slate-400">${100 - lP}%</span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            const owner = document.getElementById('result-owner-actions');
            const sharedFooter = document.getElementById('shared-take-test-footer');
            const tagline = document.getElementById('global-owner-tagline');
            if (fromShare) {
                owner?.classList.add('hidden');
                sharedFooter?.classList.remove('hidden');
                tagline?.classList.add('hidden');
            } else {
                owner?.classList.remove('hidden');
                sharedFooter?.classList.add('hidden');
                tagline?.classList.remove('hidden');
            }
        };

        window.showTypeDetail = (mode) => {
            const currentMbti = document.getElementById('result-mbti').innerText;
            const currentData = typeData[currentMbti] || typeData["ERHC"];
            const targetMbti = mode === 'best' ? currentData.best : currentData.worst;
            const targetData = typeData[targetMbti];

            if (!targetData) return;

            document.getElementById('modal-type-code').innerText = targetMbti;
            document.getElementById('modal-type-title').innerText = targetData.title;
            document.getElementById('modal-type-tag').innerText = mode === 'best' ? '❤️ 환상의 짝꿍인 이유' : '💣 파멸의 조합인 이유';
            document.getElementById('modal-type-desc').innerText = mode === 'best' ? currentData.bestDetail : currentData.worstDetail;
            document.getElementById('type-modal').classList.add('active');
        };

        document.getElementById('start-btn').onclick = () => {
            document.getElementById('home-screen').classList.add('hidden');
            document.getElementById('test-screen').classList.remove('hidden');
            document.getElementById('progress-wrapper').classList.remove('hidden');
            renderQuestions();
        };

        document.getElementById('retest-btn').onclick = () => location.reload();

        document.getElementById('shared-take-test-btn')?.addEventListener('click', () => {
            location.href = SHARE_PAGE_PATH;
        });

        document.getElementById('submit-btn').onclick = calculateAndSave;

        const copyToClipboard = (text) => {
            return new Promise((resolve, reject) => {
                if (navigator.clipboard && window.isSecureContext) {
                    navigator.clipboard.writeText(text)
                        .then(resolve)
                        .catch(() => {
                            useExecCommand(text) ? resolve() : reject();
                        });
                } else {
                    useExecCommand(text) ? resolve() : reject();
                }
            });
        };

        const useExecCommand = (text) => {
            try {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                textArea.style.position = "fixed";
                textArea.style.left = "-9999px";
                textArea.style.top = "0";
                document.body.appendChild(textArea);
                textArea.focus();
                textArea.select();
                const successful = document.execCommand('copy');
                document.body.removeChild(textArea);
                return successful;
            } catch (err) {
                console.error('Fallback copy failed:', err);
                return false;
            }
        };

        document.getElementById('share-link-btn').onclick = async () => {
            if (!lastMbti || !lastScores) {
                showToastMessage('먼저 결과를 확인한 뒤 다시 눌러줘!');
                return;
            }
            const r = encodeSharePayload(lastMbti, lastScores);
            const url = window.location.origin + SHARE_PAGE_PATH + '?r=' + encodeURIComponent(r);
            const shareText = `${SHARE_CLIPBOARD_INTRO}\n${url}`;

            if (navigator.share) {
                try {
                    await navigator.share({
                        title: '말랑 이별 MBTI',
                        text: SHARE_CLIPBOARD_INTRO,
                        url
                    });
                    showToast();
                    return;
                } catch (err) {
                    if (err && err.name === 'AbortError') return;
                }
            }

            copyToClipboard(shareText)
                .then(() => showToast())
                .catch(() => {
                    prompt("복사 기능이 지원되지 않는 환경입니다. 아래 내용을 직접 복사해주세요!", shareText);
                });
        };

        const defaultCopyToastText = document.getElementById('toast').textContent.trim();

        const showToast = () => {
            showToastMessage(defaultCopyToastText);
        };

        function showToastMessage(msg) {
            const t = document.getElementById('toast');
            if (t) {
                t.textContent = msg;
                t.classList.add('show');
                setTimeout(() => t.classList.remove('show'), 2500);
            }
        }

        if (!tryOpenSharedFromUrl()) {
            init();
        }
    </script>
</body>
</html>
